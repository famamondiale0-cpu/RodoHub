<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Rodolico Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <nav class="border-b border-slate-800 px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="dashboard.html" class="text-slate-400 hover:text-white transition">← Esci</a>
            <h1 class="font-black tracking-widest text-indigo-500 uppercase text-sm">Area Riservata Rappresentanti</h1>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12">
        <div class="mb-10">
            <h2 class="text-4xl font-extrabold mb-2">Pubblica Avviso</h2>
            <p class="text-slate-400">Inserisci i dettagli del comunicato che apparirà in bacheca.</p>
        </div>

        <div class="bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-slate-700 space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Titolo Avviso</label>
                <input type="text" id="titolo" placeholder="Es: Assemblea d'Istituto" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Categoria (Tag)</label>
                <select id="tag" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    <option value="NEWS">News</option>
                    <option value="IMPORTANTE">Importante</option>
                    <option value="EVENTI">Eventi</option>
                    <option value="CIRCOLARE">Circolare</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Messaggio</label>
                <textarea id="messaggio" placeholder="Scrivi qui il testo del comunicato..." class="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition h-40"></textarea>
            </div>

            <button id="pubblicaBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-indigo-900/40 transform active:scale-95">
                PUBBLICA IN BACHECA
            </button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsW9T36UH47Cy2hLVFC9m2wZxE_S22k4M",
            authDomain: "rodolicohub.firebaseapp.com",
            projectId: "rodolicohub",
            storageBucket: "rodolicohub.firebasestorage.app",
            messagingSenderId: "1066843178658",
            appId: "1:1066843178658:web:5c0d95f10eae4a7384b9fb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('pubblicaBtn').addEventListener('click', async () => {
            const titolo = document.getElementById('titolo').value;
            const tag = document.getElementById('tag').value;
            const messaggio = document.getElementById('messaggio').value;

            if (titolo && messaggio) {
                try {
                    await addDoc(collection(db, "avvisi"), {
                        titolo: titolo,
                        tag: tag,
                        messaggio: messaggio,
                        data: serverTimestamp()
                    });
                    alert("✅ AVVISO PUBBLICATO! Ora è visibile in bacheca.");
                    // Pulisce i campi
                    document.getElementById('titolo').value = "";
                    document.getElementById('messaggio').value = "";
                } catch (e) {
                    alert("Errore: " + e.message);
                }
            } else {
                alert("Per favore, compila tutti i campi!");
            }
        });
    </script>
</body>
</html>

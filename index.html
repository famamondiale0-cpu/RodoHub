<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RodolicoHub | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-center mb-6">Rodolico<span class="text-indigo-600">Hub</span></h2>
        
        <div class="space-y-4">
            <select id="roleSelect" onchange="checkRole()" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="studente">Studente</option>
                <option value="rappresentante">Rappresentante</option>
            </select>

            <input type="email" id="userEmail" placeholder="Email istituzionale" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none">
            
            <div id="adminCodeBox" class="hidden">
                <input type="password" id="adminCode" placeholder="Codice Segreto" class="w-full p-3 rounded-xl bg-amber-50 border border-amber-200">
            </div>

            <button id="loginBtn" onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition active:scale-95">
                ENTRA ORA
            </button>
        </div>
    </div>

    <script type="module" src="./auth.js" onerror="console.error('Il file auth.js non è stato trovato!')"></script>
</body>
</html>

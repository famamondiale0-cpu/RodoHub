<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RodolicoHub | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-center mb-6">Rodolico<span class="text-indigo-600">Hub</span></h2>
        
        <div class="space-y-4">
            <select id="roleSelect" onchange="checkRole()" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 font-bold outline-none">
                <option value="studente">Sono uno Studente</option>
                <option value="rappresentante">Sono un Rappresentante</option>
            </select>

            <input type="email" id="userEmail" placeholder="Email @rodolico.it" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none">
            
            <div id="adminCodeBox" class="hidden">
                <input type="password" id="adminCode" placeholder="Codice Segreto" class="w-full p-3 rounded-xl bg-amber-50 border border-amber-200">
            </div>

            <button id="loginBtn" onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition transform active:scale-95">
                ENTRA ORA
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWr43om-WIK_nS1FCUXOj9X0goQgYSNvM",
            authDomain: "rodolicohub.firebaseapp.com",
            projectId: "rodolicohub",
            storageBucket: "rodolicohub.firebasestorage.app",
            messagingSenderId: "1066843178658",
            appId: "1:1066843178658:web:5c0d95f10eae4a7384b9fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.checkRole = () => {
            const role = document.getElementById('roleSelect').value;
            document.getElementById('adminCodeBox').classList.toggle('hidden', role !== 'rappresentante');
        };

        window.handleLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('roleSelect').value;
            const code = document.getElementById('adminCode').value;
            const btn = document.getElementById('loginBtn');
            const password = "password_automatica_123";

            if (!email.includes('@')) return alert("Inserisci una mail valida!");
            if (role === 'rappresentante' && code !== '12345') return alert("Codice errato!");

            btn.disabled = true;
            btn.innerText = "CONNESSIONE...";

            try {
                // Prova il login
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('userRole', role === 'rappresentante' ? 'admin' : 'studente');
                window.location.href = 'dashboard.html';
            } catch (err) {
                // Se l'utente non esiste (errore comune al primo accesso), lo creiamo
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/invalid-login-credentials') {
                    try {
                        const userCred = await createUserWithEmailAndPassword(auth, email, password);
                        await setDoc(doc(db, "utenti", userCred.user.uid), { email, role });
                        localStorage.setItem('userRole', role === 'rappresentante' ? 'admin' : 'studente');
                        window.location.href = 'dashboard.html';
                    } catch (e) { 
                        alert("Errore: " + e.message); 
                        btn.disabled = false;
                        btn.innerText = "ENTRA ORA";
                    }
                } else {
                    alert("Errore Firebase: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "ENTRA ORA";
                }
            }
        };
    </script>
</body>
</html>

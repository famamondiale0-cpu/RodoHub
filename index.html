<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RodolicoHub | Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 px-6 py-4 glass border-b border-white/20">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-lg rotate-3 italic font-black">R</div>
                <span class="text-xl font-extrabold tracking-tight">RODOLICO<span class="text-indigo-600">HUB</span></span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <section class="max-w-md mx-auto space-y-8">
            <div class="text-center space-y-4">
                <h2 class="text-4xl font-extrabold tracking-tighter text-slate-900">Accedi a <span class="text-indigo-600">RodoHub</span></h2>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                <div class="space-y-4">
                    <select id="roleSelect" onchange="checkRole()" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="studente">Studente</option>
                        <option value="rappresentante">Rappresentante</option>
                    </select>

                    <input type="email" id="userEmail" placeholder="Email @rodolico.it" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    
                    <div id="adminCodeBox" class="hidden">
                        <input type="password" id="adminCode" placeholder="Codice Segreto" class="w-full p-3 rounded-xl bg-amber-50 border border-amber-200">
                    </div>

                    <button id="loginBtn" onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition transform active:scale-95">
                        ENTRA ORA
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAZIONE CON LA TUA NUOVA CHIAVE
        const firebaseConfig = {
            apiKey: "AIzaSyDWr43om-WIK_nS1FCUXOj9X0goQgYSNvM",
            authDomain: "rodolicohub.firebaseapp.com",
            projectId: "rodolicohub",
            storageBucket: "rodolicohub.firebasestorage.app",
            messagingSenderId: "1066843178658",
            appId: "1:1066843178658:web:5c0d95f10eae4a7384b9fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.checkRole = () => {
            const role = document.getElementById('roleSelect').value;
            document.getElementById('adminCodeBox').classList.toggle('hidden', role !== 'rappresentante');
        };

        window.handleLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('roleSelect').value;
            const code = document.getElementById('adminCode').value;
            const btn = document.getElementById('loginBtn');
            const password = "password_base_123";

            if (!email.includes('@')) return alert("Usa una mail valida!");
            if (role === 'rappresentante' && code !== '12345') return alert("Codice errato!");

            btn.disabled = true;
            btn.innerText = "CONNESSIONE...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('userRole', role === 'rappresentante' ? 'admin' : 'studente');
                window.location.href = 'dashboard.html';
            } catch (err) {
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/invalid-login-credentials') {
                    try {
                        const userCred = await createUserWithEmailAndPassword(auth, email, password);
                        await setDoc(doc(db, "utenti", userCred.user.uid), { email, role });
                        localStorage.setItem('userRole', role === 'rappresentante' ? 'admin' : 'studente');
                        window.location.href = 'dashboard.html';
                    } catch (e) { 
                        alert("Errore Firebase: " + e.message); 
                        btn.disabled = false;
                        btn.innerText = "ENTRA ORA";
                    }
                } else {
                    alert("Errore: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "ENTRA ORA";
                }
            }
        };
    </script>
</body>
</html>
